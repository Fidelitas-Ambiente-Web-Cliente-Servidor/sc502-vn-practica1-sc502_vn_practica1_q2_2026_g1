<main class="container my-5">
    <div class="row g-5">
      <div class="col-lg-7">
        <h2 class="mb-4">Envíanos un mensaje</h2>
        <div class="mb-3">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-control" placeholder="Tu nombre" />
        </div>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" placeholder="correo@ejemplo.com" />
        </div>
        <div class="mb-3">
          <label class="form-label">Teléfono</label>
          <input type="tel" class="form-control" placeholder="+506 0000-0000" />
        </div>
        <div class="mb-3">
          <label class="form-label">Asunto</label>
          <input type="text" class="form-control" placeholder="Asunto del mensaje" />
        </div>
        <div class="mb-3">
          <label class="form-label">Mensaje</label>
          <textarea class="form-control" rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>
        </div>
        <button class="btn-contact">Enviar mensaje</button>
      </div>
    </div>
  </main>
